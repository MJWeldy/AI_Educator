      - slug: pythagorean-theorem
        title: The Pythagorean theorem
        description: Relating the sides of right triangles.
        est_minutes: 12
        generators: [geometry.pythagorean]
        prereqs: [square-roots, perimeter-area]
        lesson: |
          In any **right triangle**, the two shorter sides (the *legs* $a$ and $b$) and
          the longest side (the *hypotenuse* $c$, opposite the right angle) are locked
          together by the Pythagorean theorem:

          $$a^2 + b^2 = c^2$$

          Squares built on the two legs together cover exactly the square built on the
          hypotenuse. This lets you find any missing side of a right triangle:

          - hypotenuse: $c = \sqrt{a^2 + b^2}$
          - a leg: $a = \sqrt{c^2 - b^2}$

          Some whole-number triples come up constantly: $(3,4,5)$, $(5,12,13)$, $(8,15,17)$.
        worked_examples:
          - problem: A right triangle has legs $6$ and $8$. Find the hypotenuse.
            solution: |
              $c = \sqrt{6^2 + 8^2} = \sqrt{36 + 64} = \sqrt{100} = 10$.
          - problem: A $13$-unit ladder leans against a wall, with its base $5$ units out. How high does it reach?
            solution: |
              The ladder is the hypotenuse: height $= \sqrt{13^2 - 5^2} = \sqrt{144} = 12$ units.
