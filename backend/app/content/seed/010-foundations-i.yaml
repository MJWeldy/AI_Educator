  - title: Expressions & Equations (Grades 6–8)
    topics:
      - slug: variables-expressions
        title: Variables and expressions
        description: Translating words to algebraic expressions.
        est_minutes: 8
        generators: [algebra.translate]
        prereqs: [order-of-operations]
        resources:
          - kind: reading
            title: Khan Academy — Pre-algebra
            url: https://www.khanacademy.org/math/pre-algebra
      - slug: evaluate-expressions
        title: Evaluating expressions
        description: Substituting values into expressions.
        est_minutes: 8
        generators: [algebra.evaluate]
        prereqs: [variables-expressions, integer-mul-div]
      - slug: combine-like-terms
        title: Combining like terms
        description: Simplifying sums of terms.
        est_minutes: 10
        generators: [algebra.combine_like_terms]
        prereqs: [variables-expressions]
      - slug: distributive-property
        title: The distributive property
        description: Expanding a(b + c).
        est_minutes: 10
        generators: [algebra.distribute]
        prereqs: [combine-like-terms, whole-multiply]
      - slug: one-step-equations
        title: One-step equations
        description: Solving x + a = b and ax = b.
        est_minutes: 10
        generators: [algebra.one_step]
        prereqs: [evaluate-expressions]
        lesson: |
          An **equation** states that two expressions are equal. To solve it, undo
          whatever was done to the variable — and whatever you do to one side, do to
          the other, keeping the balance.

          - $x + 7 = 12$ → subtract 7 from both sides → $x = 5$
          - $4x = 28$ → divide both sides by 4 → $x = 7$
          - $\frac{x}{3} = 6$ → multiply both sides by 3 → $x = 18$

          Always **check** by substituting back: $4 \times 7 = 28$. ✓
        worked_examples:
          - problem: Solve $x - 9 = 15$.
            solution: |
              Add 9 to both sides: $x = 24$.
          - problem: Solve $-6x = 42$.
            solution: |
              Divide both sides by $-6$: $x = -7$.
        resources:
          - kind: reading
            title: Khan Academy — One-step equations
            url: https://www.khanacademy.org/math/pre-algebra/xb4832e56:one-step-and-two-step-equations-and-inequalities
      - slug: two-step-equations
        title: Two-step equations
        description: Solving ax + b = c.
        est_minutes: 12
        generators: [algebra.two_step]
        prereqs: [one-step-equations, distributive-property]
        lesson: |
          For an equation like $3x + 5 = 20$, undo operations in **reverse order** of
          how they'd be applied: the $+5$ came last, so remove it first.

          1. Subtract 5: $3x = 15$
          2. Divide by 3: $x = 5$

          If the equation has parentheses, like $2(x - 4) = 10$, either distribute
          first or divide both sides by 2 first — both work.
        worked_examples:
          - problem: Solve $5x - 7 = 23$.
            solution: |
              Add 7: $5x = 30$. Divide by 5: $x = 6$.
          - problem: Solve $\dfrac{x}{4} + 3 = 10$.
            solution: |
              Subtract 3: $\dfrac{x}{4} = 7$. Multiply by 4: $x = 28$.
